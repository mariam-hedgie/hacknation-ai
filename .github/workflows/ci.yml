name: CI

on:
  push:
    branches: [main, mariam]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/referral-copilot/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r apps/referral-copilot/requirements.txt
      - name: Verify Python environment
        run: python -m pip check
      - name: Run Python tests
        run: python -m unittest discover -s apps/referral-copilot/tests -q
      - name: Compile Python sources
        run: python -m compileall -q apps/referral-copilot databricks
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Run Node tests
        run: npm test
      - name: Audit production Node dependencies
        run: npm audit --omit=dev --audit-level=high
